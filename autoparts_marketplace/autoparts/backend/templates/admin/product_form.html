{% extends 'admin/base.html' %}
{% block title %}{{ action }} Product - Admin{% endblock %}
{% block page_title %}{{ action }} Product{% endblock %}
{% block content %}

<div class="form-card">
    <form method="POST" class="admin-form">
        <div class="form-row">
            <div class="form-group">
                <label>Product Name *</label>
                <input type="text" name="name" required value="{{ product.name if product else '' }}" placeholder="e.g. High Performance Brake Pads">
            </div>
            <div class="form-group">
                <label>Brand *</label>
                <input type="text" name="brand" required value="{{ product.brand if product else '' }}" placeholder="e.g. Brembo">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Category *</label>
                <select name="category" required>
                    <option value="">Select category...</option>
                    {% for cat in ['Engine', 'Brake', 'Suspension', 'Electrical', 'Body', 'Transmission', 'Cooling', 'Fuel System', 'Other'] %}
                    <option value="{{ cat }}" {% if product and product.category == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Price (BDT) *</label>
                <input type="number" name="price" required step="0.01" min="0" 
                       value="{{ product.price if product else '' }}" placeholder="0.00">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Stock Quantity *</label>
                <input type="number" name="stock" required min="0" 
                       value="{{ product.stock if product else '0' }}">
            </div>
            <div class="form-group">
                <label>Image URL</label>
                <input type="url" name="image_url" value="{{ product.image_url if product else '' }}" 
                       placeholder="https://example.com/image.jpg">
            </div>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea name="description" rows="3" placeholder="Describe the product...">{{ product.description if product else '' }}</textarea>
        </div>

        <div class="form-group">
            <label>Vehicle Compatibility</label>
            <textarea name="compatibility" rows="2" placeholder="e.g. Toyota Corolla 2015-2022, Honda Civic 2016-2023">{{ product.compatibility if product else '' }}</textarea>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('admin.products') }}" class="btn-cancel">Cancel</a>
            <button type="submit" class="btn-submit">{{ action }} Product</button>
        </div>
    </form>
</div>

{% endblock %}
